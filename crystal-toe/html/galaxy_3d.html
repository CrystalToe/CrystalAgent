<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Crystal Topos — Galaxy Collision</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
  #hud{position:absolute;top:0;left:0;right:0;padding:10px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.8) 60%,transparent);z-index:10;pointer-events:none}
  h1{font-size:1em;color:#7ec8e3;letter-spacing:3px}
  h1 span{color:#e74c3c}
  .sub{color:#444;font-size:0.65em}
  .chips{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
  .chip{background:rgba(126,200,227,0.06);border:1px solid rgba(126,200,227,0.1);border-radius:14px;padding:2px 9px;font-size:0.58em;color:#5a9;font-family:monospace}
  .chip b{color:#7ec8e3}
  #stats{position:absolute;bottom:10px;left:16px;font-family:monospace;font-size:0.65em;color:#333;z-index:10}
  #stats b{color:#5a9}
  #ctrl{position:absolute;bottom:10px;right:16px;z-index:10;display:flex;gap:6px}
  #ctrl button{background:rgba(255,255,255,0.04);border:1px solid #1a1a3a;color:#5a9;padding:4px 12px;border-radius:5px;cursor:pointer;font-size:0.65em}
</style>
</head>
<body>
<div id="hud">
  <h1>GALAXY <span>COLLISION</span></h1>
  <div class="sub">Two Plummer spheres — octree N_w³=8 children — force 1/r^(N_c−1) — phase χ=6 per body</div>
  <div class="chips">
    <span class="chip"><b>Octree</b>=N_w³=8</span>
    <span class="chip"><b>Force</b>=1/r²</span>
    <span class="chip"><b>Phase</b>=χ=6/body</span>
    <span class="chip"><b>Particles</b>=<span id="pn">0</span></span>
  </div>
</div>
<div id="stats">Step <b id="ss">0</b> · E <b id="se">—</b> · ΔE <b id="sde">—</b></div>
<div id="ctrl">
  <button onclick="preset('collision')">Collision</button>
  <button onclick="preset('flyby')">Flyby</button>
  <button onclick="preset('three')">Triple</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
let NBody, OK=false;
try { const m=await import('./pkg/crystal_toe.js'); await m.default(); NBody=m.WasmNBody; OK=true; } catch(e) { console.warn('JS fallback:', e.message); }

const N_PER = 1500;
let sim, E0, step=0;
// JS fallback
let jx,jy,jz,jvx,jvy,jvz,jm,jn;
function jsInit(n){jn=n;jx=new Float64Array(n);jy=new Float64Array(n);jz=new Float64Array(n);jvx=new Float64Array(n);jvy=new Float64Array(n);jvz=new Float64Array(n);jm=new Float64Array(n);step=0}
function jsAdd(i,px,py,pz,vx,vy,vz,m){jx[i]=px;jy[i]=py;jz[i]=pz;jvx[i]=vx;jvy[i]=vy;jvz[i]=vz;jm[i]=m}
function jsTick(){
  const dt=0.005,eps2=0.05*0.05;
  for(let i=0;i<jn;i++){let ax=0,ay=0,az=0;
    for(let j=0;j<jn;j++){if(i===j)continue;const dx=jx[j]-jx[i],dy=jy[j]-jy[i],dz=jz[j]-jz[i];
      const r2=dx*dx+dy*dy+dz*dz+eps2,inv=jm[j]/(r2*Math.sqrt(r2));ax+=inv*dx;ay+=inv*dy;az+=inv*dz}
    jvx[i]+=ax*dt;jvy[i]+=ay*dt;jvz[i]+=az*dt}
  for(let i=0;i<jn;i++){jx[i]+=jvx[i]*0.005;jy[i]+=jvy[i]*0.005;jz[i]+=jvz[i]*0.005}
  step++
}
function jsPlummer(start,n,tm,rs,cx,cy,cz,bvx,bvy,bvz){
  const mEach=tm/n;
  for(let i=0;i<n;i++){const fi=(i+1)/n,th=fi*7.13,ph=fi*11.07,r=rs*(Math.pow(fi,0.33)+0.1);
    const x=r*Math.sin(th)*Math.cos(ph)+cx,y=r*Math.sin(th)*Math.sin(ph)+cy,z=r*Math.cos(th)+cz;
    const vs=0.1*Math.sqrt(tm/(r+rs));
    jsAdd(start+i,x,y,z,vs*Math.cos(ph+1.5)+bvx,vs*Math.sin(ph+1.5)+bvy,vs*Math.cos(th)*0.3+bvz,mEach)}
}

function preset(name) {
  if (OK) {
    sim = new NBody(0.005, 0.05);
    if (name==='collision') { sim.add_galaxy(N_PER,1,1,-3,0,0,0.3,0.1,0); sim.add_galaxy(N_PER,0.8,0.8,3,0,0,-0.3,-0.05,0); }
    else if (name==='flyby') { sim.add_galaxy(N_PER,1,1,-4,-2,0,0.2,0.15,0); sim.add_galaxy(N_PER,0.6,0.7,4,2,0,-0.15,-0.1,0); }
    else { const n3=Math.floor(N_PER/2); sim.add_galaxy(n3,0.8,0.8,-3,-2,0,0.15,0.2,0); sim.add_galaxy(n3,0.6,0.7,3,-1,0,-0.2,0.1,0); sim.add_galaxy(n3,0.5,0.6,0,3,0,0.05,-0.2,0); }
    E0 = sim.total_energy();
    document.getElementById('pn').textContent = sim.n_bodies();
    updateParticles();
  } else {
    const total = name==='three' ? N_PER*3/2 : N_PER*2;
    jsInit(total);
    if (name==='collision') { jsPlummer(0,N_PER,1,1,-3,0,0,0.3,0.1,0); jsPlummer(N_PER,N_PER,0.8,0.8,3,0,0,-0.3,-0.05,0); }
    else if (name==='flyby') { jsPlummer(0,N_PER,1,1,-4,-2,0,0.2,0.15,0); jsPlummer(N_PER,N_PER,0.6,0.7,4,2,0,-0.15,-0.1,0); }
    else { const n3=Math.floor(N_PER/2); jsPlummer(0,n3,0.8,0.8,-3,-2,0,0.15,0.2,0); jsPlummer(n3,n3,0.6,0.7,3,-1,0,-0.2,0.1,0); jsPlummer(n3*2,n3,0.5,0.6,0,3,0,0.05,-0.2,0); }
    E0 = -1; document.getElementById('pn').textContent = total;
    updateParticles();
  }
}

// Three.js
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 8, 18);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => { camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// Stars
const starGeo = new THREE.BufferGeometry();
const sp = new Float32Array(9000);
for(let i=0;i<9000;i+=3){const th=Math.random()*6.28,ph=Math.acos(2*Math.random()-1),r=200+Math.random()*300;sp[i]=r*Math.sin(ph)*Math.cos(th);sp[i+1]=r*Math.sin(ph)*Math.sin(th);sp[i+2]=r*Math.cos(ph)}
starGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.3})));

// Galaxy particles
const MAX_P = N_PER * 3;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(MAX_P * 3);
const pCol = new Float32Array(MAX_P * 3);
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
const pMat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// Glow layer (larger, dimmer)
const gGeo = new THREE.BufferGeometry();
const gPos = new Float32Array(MAX_P * 3);
const gCol = new Float32Array(MAX_P * 3);
gGeo.setAttribute('position', new THREE.BufferAttribute(gPos, 3));
gGeo.setAttribute('color', new THREE.BufferAttribute(gCol, 3));
const gMat = new THREE.PointsMaterial({ size: 0.3, vertexColors: true, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending, depthWrite: false });
const glow = new THREE.Points(gGeo, gMat);
scene.add(glow);

function updateParticles() {
  let n, bodies;
  if (OK) {
    bodies = sim.bodies();
    n = bodies.length;
  } else {
    n = jn;
  }
  for (let i = 0; i < MAX_P; i++) {
    if (i < n) {
      const b = OK ? bodies[i] : null;
      const px = OK ? b.px : jx[i], py = OK ? b.py : jy[i], pz = OK ? b.pz : jz[i];
      pPos[i*3]=px; pPos[i*3+1]=py; pPos[i*3+2]=pz;
      gPos[i*3]=px; gPos[i*3+1]=py; gPos[i*3+2]=pz;
      // Color by galaxy
      if (i < N_PER) { pCol[i*3]=0.3;pCol[i*3+1]=0.7;pCol[i*3+2]=1; gCol[i*3]=0.3;gCol[i*3+1]=0.7;gCol[i*3+2]=1; }
      else if (i < N_PER*2) { pCol[i*3]=1;pCol[i*3+1]=0.4;pCol[i*3+2]=0.2; gCol[i*3]=1;gCol[i*3+1]=0.4;gCol[i*3+2]=0.2; }
      else { pCol[i*3]=0.3;pCol[i*3+1]=1;pCol[i*3+2]=0.5; gCol[i*3]=0.3;gCol[i*3+1]=1;gCol[i*3+2]=0.5; }
    } else { pPos[i*3]=0;pPos[i*3+1]=999;pPos[i*3+2]=0; gPos[i*3]=0;gPos[i*3+1]=999;gPos[i*3+2]=0; }
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate = true;
  pGeo.setDrawRange(0, n);
  gGeo.attributes.position.needsUpdate = true;
  gGeo.attributes.color.needsUpdate = true;
  gGeo.setDrawRange(0, n);
}

let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;
  // Advance
  if (OK) sim.advance(2); else { jsTick(); jsTick(); }
  updateParticles();
  // Camera
  const t = frame * 0.0008;
  camera.position.x = 20 * Math.cos(t);
  camera.position.z = 20 * Math.sin(t);
  camera.position.y = 8 + 4 * Math.sin(t * 0.5);
  camera.lookAt(0, 0, 0);
  // Stats
  if (frame % 15 === 0) {
    const s = OK ? sim.current_step() : step;
    document.getElementById('ss').textContent = s;
    if (OK) {
      const E = sim.total_energy();
      document.getElementById('se').textContent = E.toFixed(3);
      const de = E0 ? Math.abs((E-E0)/E0*100) : 0;
      document.getElementById('sde').textContent = de.toFixed(3)+'%';
    }
  }
  renderer.render(scene, camera);
}

preset('collision');
animate();
</script>
</body>
</html>
