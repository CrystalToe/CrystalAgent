<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Playfair+Display:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#030108; overflow:hidden; font-family:'JetBrains Mono',monospace; color:#e0d8f0; }
  #info {
    position:fixed; top:20px; left:20px; z-index:10;
    background:rgba(8,4,20,0.85); border:1px solid rgba(120,80,220,0.3);
    padding:18px 22px; border-radius:12px; backdrop-filter:blur(12px);
    max-width:320px; pointer-events:none;
  }
  #info h1 { font-family:'Playfair Display',serif; font-size:18px; color:#c8a0ff; margin-bottom:8px; letter-spacing:0.5px; }
  #info .sub { font-size:10px; color:#8070a0; margin-bottom:12px; line-height:1.4; }
  .row { display:flex; justify-content:space-between; font-size:11px; margin:3px 0; }
  .row .label { color:#7068a0; }
  .row .val { color:#d0c0ff; font-weight:500; }
  .bar { height:3px; background:rgba(100,60,180,0.2); border-radius:2px; margin:6px 0; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; transition:width 0.3s; }
  #controls {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10;
    display:flex; gap:12px; align-items:center;
  }
  #controls button {
    background:rgba(120,80,220,0.25); border:1px solid rgba(120,80,220,0.4);
    color:#c8a0ff; padding:8px 18px; border-radius:8px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1px;
    transition:all 0.2s;
  }
  #controls button:hover { background:rgba(120,80,220,0.45); }
  #controls button.active { background:rgba(120,80,220,0.6); border-color:#c8a0ff; }
  #tick-display {
    font-size:13px; color:#c8a0ff; font-weight:500; min-width:80px; text-align:center;
  }
  canvas { display:block; }
</style>

<div id="info">
  <h1>CrystalFriedmann</h1>
  <div class="sub">Cosmological expansion from (2,3). The dynamics IS the tick on the 36.<br>
  λ<sub>singlet</sub>=1 · λ<sub>weak</sub>=½ · λ<sub>colour</sub>=⅓ · λ<sub>mixed</sub>=⅙</div>
  <div class="row"><span class="label">Ω_Λ (dark energy)</span><span class="val" id="vOmL">0.684</span></div>
  <div class="bar"><div class="bar-fill" id="bOmL" style="width:68%;background:linear-gradient(90deg,#6030c0,#c060ff)"></div></div>
  <div class="row"><span class="label">Ω_m (matter)</span><span class="val" id="vOmM">0.316</span></div>
  <div class="bar"><div class="bar-fill" id="bOmM" style="width:32%;background:linear-gradient(90deg,#2060c0,#40a0ff)"></div></div>
  <div class="row"><span class="label">Ω_r (radiation)</span><span class="val" id="vOmR">0.000</span></div>
  <div class="bar"><div class="bar-fill" id="bOmR" style="width:1%;background:linear-gradient(90deg,#c06020,#ff8040)"></div></div>
  <div style="height:8px"></div>
  <div class="row"><span class="label">Scale factor a</span><span class="val" id="vA">1.000</span></div>
  <div class="row"><span class="label">Hubble H</span><span class="val" id="vH">1.000</span></div>
  <div class="row"><span class="label">T_CMB</span><span class="val" id="vT">2.714</span></div>
  <div class="row"><span class="label">Deceleration q</span><span class="val" id="vQ">—</span></div>
  <div class="row"><span class="label">Entropy S</span><span class="val" id="vS">—</span></div>
</div>

<div id="controls">
  <button id="btnReset">RESET</button>
  <button id="btnPlay" class="active">▶ PLAY</button>
  <button id="btnStep">TICK</button>
  <div id="tick-display">tick 0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
// CRYSTAL ENGINE: The 36-dimensional CrystalState
// ══════════════════════════════════════════════════════════════
const NW=2, NC=3, CHI=NW*NC, BETA0=7, GAUSS=NW*NW+NC*NC;
const D1=1, D2=3, D3=8, D4=24, SIGMA_D=36, TOWER_D=SIGMA_D+CHI;
const LAMBDA = [1.0, 1/NW, 1/NC, 1/CHI]; // {1, 1/2, 1/3, 1/6}
const WK = [1.0, 1/Math.sqrt(NW), 1/Math.sqrt(NC), 1/Math.sqrt(CHI)];
const STARTS = [0, D1, D1+D2, D1+D2+D3];
const DIMS = [D1, D2, D3, D4];

function sectorOf(i) { return i<D1?0:i<D1+D2?1:i<D1+D2+D3?2:3; }
function zeroState() { return new Float64Array(SIGMA_D); }
function extractSector(k,s) { return Array.from(s.slice(STARTS[k], STARTS[k]+DIMS[k])); }
function injectSector(k,vals,s) { for(let i=0;i<DIMS[k];i++) s[STARTS[k]+i]=vals[i]; }

// tick :: CrystalState -> CrystalState (multiply by eigenvalue)
function tick(s) {
  const out = new Float64Array(SIGMA_D);
  for(let i=0;i<SIGMA_D;i++) out[i] = s[i] * LAMBDA[sectorOf(i)];
  return out;
}

// W step: kick geometry from matter
function wStep(s) {
  const out = new Float64Array(s);
  const w = extractSector(1,s), c = extractSector(2,s);
  const w1=WK[1], w2=WK[2], w3=WK[3];
  // Kick weak from colour
  const phi=w[0], adot=w[1], K=w[2];
  const H=c[0], omM=c[1], rho=c[3];
  const eTot = s[0];
  out[STARTS[1]+0] = (phi + w1*H*phi) * w1;
  out[STARTS[1]+1] = (adot + w1*H*phi) * w1;
  out[STARTS[1]+2] = (K + w1*(omM*rho - eTot)) * w1;
  // Colour self-contracts
  for(let i=0;i<D3;i++) out[STARTS[2]+i] = c[i]*w2;
  // Mixed contracts
  for(let i=0;i<D4;i++) out[STARTS[3]+i] = s[STARTS[3]+i]*w3;
  return out;
}

// U step 3D: couple neighbors
function uStep3D(grid, N) {
  const out = grid.map(s => new Float64Array(s));
  for(let iz=0;iz<N;iz++) for(let iy=0;iy<N;iy++) for(let ix=0;ix<N;ix++) {
    const idx = iz*N*N + iy*N + ix;
    for(let k=1;k<=3;k++) {
      const u2 = WK[k]*WK[k] / NC;
      const sec = extractSector(k, grid[idx]);
      const dim = DIMS[k];
      const newSec = new Array(dim);
      // 6 neighbors
      const neighbors = [
        grid[iz*N*N+iy*N+Math.min(ix+1,N-1)],
        grid[iz*N*N+iy*N+Math.max(ix-1,0)],
        grid[iz*N*N+Math.min(iy+1,N-1)*N+ix],
        grid[iz*N*N+Math.max(iy-1,0)*N+ix],
        grid[Math.min(iz+1,N-1)*N*N+iy*N+ix],
        grid[Math.max(iz-1,0)*N*N+iy*N+ix],
      ];
      for(let d=0;d<dim;d++) {
        let lap = 0;
        for(const nb of neighbors) lap += nb[STARTS[k]+d];
        lap -= 6*sec[d];
        newSec[d] = sec[d] + u2*lap;
      }
      injectSector(k, newSec, out[idx]);
    }
  }
  return out;
}

// Full tick: S = W∘U
function fullTick3D(grid, N) {
  const afterU = uStep3D(grid, N);
  return afterU.map(s => wStep(s));
}

// ══════════════════════════════════════════════════════════════
// INITIALIZATION: 6x6x6 cosmological lattice
// ══════════════════════════════════════════════════════════════
const N = 6;
const OMEGA_L = GAUSS/(GAUSS+CHI);
const OMEGA_M = CHI/(GAUSS+CHI);
const T_CMB = (GAUSS+CHI)/BETA0;

function initLattice() {
  const grid = [];
  const center = N/2;
  for(let iz=0;iz<N;iz++) for(let iy=0;iy<N;iy++) for(let ix=0;ix<N;ix++) {
    const s = zeroState();
    const dx=ix-center, dy=iy-center, dz=iz-center;
    const r2 = dx*dx+dy*dy+dz*dz;
    const bump = Math.exp(-r2/(N*N/4));
    s[0] = 1.0; // E_tot (singlet, conserved)
    s[STARTS[1]+0] = 1.0; // a
    s[STARTS[1]+1] = 0.7; // adot
    s[STARTS[1]+2] = 0.0; // K
    s[STARTS[2]+0] = 1.0; // H
    s[STARTS[2]+1] = OMEGA_M * (1 + 0.3*bump); // Omega_m
    s[STARTS[2]+2] = 9e-5; // Omega_r
    s[STARTS[2]+3] = 1.0 + 0.3*bump; // rho
    s[STARTS[2]+4] = -OMEGA_L; // P
    s[STARTS[2]+6] = T_CMB; // T_CMB
    s[STARTS[2]+7] = 1.0; // S_hor
    // Perturbation modes
    for(let m=0;m<D4;m++) {
      s[STARTS[3]+m] = 0.02 * bump * Math.sin((m+1)*Math.PI*ix/N);
    }
    grid.push(s);
  }
  return grid;
}

// ══════════════════════════════════════════════════════════════
// THREE.JS SCENE
// ══════════════════════════════════════════════════════════════
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(12, 10, 14);
camera.lookAt(0,0,0);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const amb = new THREE.AmbientLight(0x201030, 0.4);
scene.add(amb);
const dir = new THREE.DirectionalLight(0xc0a0ff, 0.8);
dir.position.set(5,10,7);
scene.add(dir);
const point = new THREE.PointLight(0x8040ff, 1.5, 30);
point.position.set(0,0,0);
scene.add(point);

// Create spheres for each lattice site
const spheres = [];
const baseMat = new THREE.MeshStandardMaterial({
  metalness: 0.3, roughness: 0.4, transparent: true, opacity: 0.85
});
const spacing = 1.8;
const offset = (N-1)*spacing/2;

for(let iz=0;iz<N;iz++) for(let iy=0;iy<N;iy++) for(let ix=0;ix<N;ix++) {
  const geo = new THREE.SphereGeometry(0.35, 16, 16);
  const mat = baseMat.clone();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(ix*spacing-offset, iy*spacing-offset, iz*spacing-offset);
  scene.add(mesh);
  spheres.push({ mesh, ix, iy, iz, baseScale: 0.35 });
}

// Connection lines (edges between nearest neighbors)
const lineMat = new THREE.LineBasicMaterial({ color:0x4020a0, transparent:true, opacity:0.15 });
for(let iz=0;iz<N;iz++) for(let iy=0;iy<N;iy++) for(let ix=0;ix<N;ix++) {
  const idx = iz*N*N+iy*N+ix;
  const p = spheres[idx].mesh.position;
  if(ix<N-1) {
    const g=new THREE.BufferGeometry().setFromPoints([p, spheres[idx+1].mesh.position]);
    scene.add(new THREE.Line(g,lineMat));
  }
  if(iy<N-1) {
    const g=new THREE.BufferGeometry().setFromPoints([p, spheres[idx+N].mesh.position]);
    scene.add(new THREE.Line(g,lineMat));
  }
  if(iz<N-1) {
    const g=new THREE.BufferGeometry().setFromPoints([p, spheres[idx+N*N].mesh.position]);
    scene.add(new THREE.Line(g,lineMat));
  }
}

// Stars background
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i=0;i<2000;i++) {
  starVerts.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color:0x8888cc, size:0.15, transparent:true, opacity:0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// ══════════════════════════════════════════════════════════════
// SIMULATION LOOP
// ══════════════════════════════════════════════════════════════
let grid = initLattice();
let tickCount = 0;
let playing = true;
let tickTimer = 0;
const TICK_INTERVAL = 0.6; // seconds between ticks

function updateVisuals() {
  let totSing=0, totWeak=0, totCol=0, totMix=0;
  let avgA=0, avgH=0, avgT=0;

  for(let i=0;i<grid.length;i++) {
    const s = grid[i];
    const sp = spheres[i];

    const eTot = s[0];
    const a = s[STARTS[1]];
    const H = s[STARTS[2]];
    const omM = s[STARTS[2]+1];
    const tcmb = s[STARTS[2]+6];

    // Sector norms
    let sN=eTot*eTot, wN=0, cN=0, mN=0;
    for(let j=0;j<D2;j++) wN += s[STARTS[1]+j]**2;
    for(let j=0;j<D3;j++) cN += s[STARTS[2]+j]**2;
    for(let j=0;j<D4;j++) mN += s[STARTS[3]+j]**2;
    const tot = sN+wN+cN+mN || 1;

    totSing+=sN; totWeak+=wN; totCol+=cN; totMix+=mN;
    avgA+=Math.abs(a); avgH+=Math.abs(H); avgT+=Math.abs(tcmb);

    // Radius: scale factor (clamped)
    const radius = Math.max(0.1, Math.min(1.2, Math.abs(a) * 0.4));
    sp.mesh.scale.setScalar(radius / sp.baseScale);

    // Color: blend from blue (matter-dominated) to purple (dark energy)
    const darkFrac = sN/tot;
    const matFrac = cN/tot;
    const pertFrac = Math.sqrt(mN) * 2;

    const r = 0.15 + 0.7*darkFrac + 0.3*pertFrac;
    const g = 0.05 + 0.15*matFrac;
    const b = 0.3 + 0.5*matFrac + 0.2*darkFrac;
    sp.mesh.material.color.setRGB(
      Math.min(1,r), Math.min(1,g), Math.min(1,b)
    );
    sp.mesh.material.emissive.setRGB(
      darkFrac*0.4, pertFrac*0.1, darkFrac*0.25 + matFrac*0.15
    );
    sp.mesh.material.opacity = 0.3 + 0.6*Math.min(1, (cN+sN)/tot);
  }

  const totalAll = totSing+totWeak+totCol+totMix || 1;
  const oL = totSing/totalAll, oM = totCol/totalAll, oR = totMix/totalAll;
  const q = oM/2 - oL;
  const nS = grid.length;
  avgA/=nS; avgH/=nS; avgT/=nS;

  document.getElementById('vOmL').textContent = oL.toFixed(4);
  document.getElementById('vOmM').textContent = oM.toFixed(4);
  document.getElementById('vOmR').textContent = oR.toFixed(4);
  document.getElementById('bOmL').style.width = (oL*100)+'%';
  document.getElementById('bOmM').style.width = (oM*100)+'%';
  document.getElementById('bOmR').style.width = Math.max(0.5,oR*100)+'%';
  document.getElementById('vA').textContent = avgA.toFixed(4);
  document.getElementById('vH').textContent = avgH.toFixed(4);
  document.getElementById('vT').textContent = avgT.toFixed(3);
  document.getElementById('vQ').textContent = q.toFixed(4);
  document.getElementById('vS').textContent = (Math.log(CHI)*tickCount).toFixed(2) + ' nats';
  document.getElementById('tick-display').textContent = 'tick ' + tickCount;
}

function doTick() {
  grid = fullTick3D(grid, N);
  tickCount++;
  updateVisuals();
}

// Controls
document.getElementById('btnPlay').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '▶ PLAY' : '⏸ PAUSE';
  this.classList.toggle('active', playing);
};
document.getElementById('btnStep').onclick = function() {
  playing = false;
  document.getElementById('btnPlay').textContent = '⏸ PAUSE';
  document.getElementById('btnPlay').classList.remove('active');
  doTick();
};
document.getElementById('btnReset').onclick = function() {
  grid = initLattice();
  tickCount = 0;
  tickTimer = 0;
  updateVisuals();
};

// Camera orbit
let angle = 0;
function animate(time) {
  requestAnimationFrame(animate);
  const dt = 1/60;

  // Auto-tick
  if(playing) {
    tickTimer += dt;
    if(tickTimer >= TICK_INTERVAL) {
      tickTimer = 0;
      doTick();
    }
  }

  // Camera orbit
  angle += 0.003;
  const camR = 16 + 2*Math.sin(angle*0.3);
  camera.position.x = Math.cos(angle)*camR;
  camera.position.z = Math.sin(angle)*camR;
  camera.position.y = 8 + 3*Math.sin(angle*0.5);
  camera.lookAt(0,0,0);

  // Pulse point light with entropy
  point.intensity = 1.0 + 0.5*Math.sin(time*0.001);
  point.color.setHSL(0.75 + 0.05*Math.sin(time*0.0005), 0.8, 0.5);

  renderer.render(scene, camera);
}

updateVisuals();
animate(0);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
